<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nithya's Universe - Secret Vault</title>
    <!-- CSS files -->
    <link rel="stylesheet" href="css/vault.css">
    <!-- JS files -->
    <script src="js/global.js"></script>
</head>
<body>
    <!-- Locked Screen Container -->
    <div class="vault-lock-screen" id="vault-lock-screen">
        <div class="lock-card reveal">
            <div class="keyhole-sticker">🔑</div>
            <h1 class="vault-title">🔮 The Secret Vault</h1>
            <p class="vault-desc">Enter the secret key to decrypt Nithya's hidden diaries.</p>
            
            <!-- Vault Combination Dial (Visual effect) -->
            <div class="dial-container">
                <div class="vault-dial" id="vault-dial">
                    <div class="dial-marker">|</div>
                    <div class="dial-marker" style="transform: rotate(30deg)">|</div>
                    <div class="dial-marker" style="transform: rotate(60deg)">|</div>
                    <div class="dial-marker" style="transform: rotate(90deg)">|</div>
                    <div class="dial-marker" style="transform: rotate(120deg)">|</div>
                    <div class="dial-marker" style="transform: rotate(150deg)">|</div>
                    <div class="dial-marker" style="transform: rotate(180deg)">|</div>
                    <div class="dial-center">🔒</div>
                </div>
            </div>
            <form id="vault-auth-form" onsubmit="event.preventDefault();">
                <div class="vault-input-group">
                    <input type="password" id="vault-passcode" placeholder="Enter Vault Passcode..." required>
                </div>
                <button type="submit" class="decrypt-btn">Unlock Sanctuary 🌙</button>
            </form>
            
            <p class="hint-text">Hint: The key is a lunar event with color... 🌙</p>
        </div>
    </div>
    <!-- Unlocked Content Container (Hidden by default) -->
    <div class="vault-unlocked-sanctuary hidden" id="vault-sanctuary">
        <header class="sanctuary-header reveal">
            <h1 class="sanctuary-title">🌌 Nithya's Sanctuary</h1>
            <p class="sanctuary-subtitle">A safe vault to write down secrets, fears, and private letters to the stars.</p>
            <button class="lock-vault-btn" id="lock-vault-btn">🔒 Re-Lock Vault</button>
        </header>
        <div class="sanctuary-layout">
            <!-- Left: Writing Desk -->
            <div class="sanctuary-panel write-secret-panel reveal">
                <h2>✍️ Record a Secret thought</h2>
                <form id="secret-thought-form" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label for="sec-title">Diary Entry Title:</label>
                        <input type="text" id="sec-title" placeholder="e.g. Midnight Thoughts..." required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="sec-content">Private Message:</label>
                        <textarea id="sec-content" rows="6" placeholder="Write down your hidden thoughts. They are safe here..." required></textarea>
                    </div>
                    <button type="submit" class="save-secret-btn">Lock in Vault 🌸</button>
                </form>
            </div>
            <!-- Right: Secret Log -->
            <div class="sanctuary-panel log-secret-panel reveal" style="animation-delay: 0.2s;">
                <h2>📓 Decrypted Diary Entries</h2>
                <div class="secret-entries-list" id="secret-list">
                    <!-- Dynamic entries render here -->
                </div>
            </div>
        </div>
    </div>
    <!-- JS files -->
    <script src="js/vault.js"></script>
</body>
</html>
